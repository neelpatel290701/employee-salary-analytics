services:
  mysql:
    image: mysql:8.0
    container_name: esa-mysql
    restart: unless-stopped
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_0900_ai_ci
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: employee_analytics
      MYSQL_USER: app
      MYSQL_PASSWORD: app
    ports:
      # Host port 3307 (not 3306) because the standard MySQL port is the
      # most commonly-conflicting one on developer laptops - it's the
      # default for any system-installed MySQL and for many other
      # docker-compose stacks. 3307 is a defensive choice that keeps
      # this project's `docker compose up -d` working out of the box
      # regardless of what else the developer has running.
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-prootpassword"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  mysql_data:
